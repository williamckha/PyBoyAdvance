name: PyBoy Advance

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

jobs:
  test-cython:
    name: Run Tests (Cython)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run tests
        env:
          PYTEST_ARTIFACTS_DIR: test-artifacts-cython
        run: |
          pytest tests

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-cython
          path: test-artifacts-cython

  test-pypy:
    name: Run Tests (PyPy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PyPy
        uses: actions/setup-python@v6
        with:
          python-version: "pypy-3.10"

      - name: Install libjpeg and zlib
        run: |
          sudo apt-get update
          sudo apt install -y libjpeg-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
          pip uninstall -y pyboy-advance

      - name: Run tests
        env:
          PYTEST_ARTIFACTS_DIR: test-artifacts-pypy
        run: |
          pytest tests

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-pypy
          path: test-artifacts-pypy
