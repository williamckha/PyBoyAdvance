name: PyBoy Advance

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

jobs:
  test-cython:
    name: Run Tests (Cython)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run tests
        env:
          PYTEST_ARTIFACTS_DIR: ${{ github.workspace }}/test-artifacts/cython
        run: |
          pytest tests

      - name: Zip test artifacts
        if: always()
        run: |
          mkdir -p test-artifacts/cython
          if [ -z "$(find test-artifacts/cython -type f)" ]; then
            echo "No test artifacts were generated." > test-artifacts/cython/README.txt
          fi
          (cd test-artifacts/cython && zip -r "$GITHUB_WORKSPACE/test-artifacts-cython.zip" .)

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-cython
          path: test-artifacts-cython.zip

  test-pypy:
    name: Run Tests (PyPy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PyPy
        uses: actions/setup-python@v6
        with:
          python-version: "pypy-3.10"

      - name: Install libjpeg and zlib
        run: |
          sudo apt-get update
          sudo apt install -y libjpeg-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]
          pip uninstall -y pyboy-advance

      - name: Run tests
        env:
          PYTEST_ARTIFACTS_DIR: ${{ github.workspace }}/test-artifacts/pypy
        run: |
          pytest tests

      - name: Zip test artifacts
        if: always()
        run: |
          mkdir -p test-artifacts/pypy
          if [ -z "$(find test-artifacts/pypy -type f)" ]; then
            echo "No test artifacts were generated." > test-artifacts/pypy/README.txt
          fi
          (cd test-artifacts/pypy && zip -r "$GITHUB_WORKSPACE/test-artifacts-pypy.zip" .)

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-pypy
          path: test-artifacts-pypy.zip
